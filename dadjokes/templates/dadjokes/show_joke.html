{% extends 'dadjokes/base.html' %}

{% block content %}
<h1>Dad Joke</h1>

<main class="grid-container">
    <article>
        <div>
            <!-- displays the joke and contributor -->
            <h2>{{joke.text}}</h2>
            <h3>by {{joke.contributor}}</h3>
        </div>
    </article>
</main>
{% endblock %}
