<!--
    File: show_profile.html
    Author: Emily Vespasiano (evespa@bu.edu), 5/27/2026
    Description: Template to display one singular mini_insta profile in a grid layout.
    Shows details of users profile picture, display name, username, bio, join date, 
    follower/following count, and post count.
-->
{% extends 'mini_insta/base.html' %}

{% block content %}
<h1>Showing Profile</h1>


<main class="grid-container">
    <article>
        <!-- displays circular profile picture to match Instagram formatting. -->
        <img src="{{profile.profile_image_url}}" alt="" style="width:200px; height:200px; border-radius:50%; object-fit:cover;">
        
        <!-- displays profile data: display name, user, bio, join date, followers/following count, posts count. -->
        <div>
            <h2>{{profile.display_name}}</h2>
            <p style="color:gray; margin-top:-10px;">@{{profile.username}}</p>
            <p>{{profile.bio_text}}</p>
            <p>Joined: {{profile.join_date}}</p>
            <p>Followers: ...</p>
            <p>Following: ...</p>
            <p>Posts: 0</p>
        </div>

    </article>
    <hr>

</main>
{% endblock %}
