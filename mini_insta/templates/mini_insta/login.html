{% load static %}
<html>
    <head>
        <title>Mini Instagram</title>
        <link rel="stylesheet" href="{% static 'styles-blog.css' %}">
    </head>
    <body>
        <h1>Mini Instagram</h1>
        <h1>Login to Mini Instagram</h1>
        <form action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            {{form}}
            <input type="submit" value="Login">
            <a href="{% url 'show_all_profiles' %}"><button type="button">Cancel</button></a>

            <hr>
            <p>Don't have a Mini Instagram account? <a href="{% url 'create_profile' %}">Create one here!</a></p>
            <!-- This basic login form works, but after login in
            assumed the existance of a page at /registration/profile, which
            does not exist.  -->
            {% if request.GET.next %}
            <input type="hidden" name="next" value="{{request.GET.next}}">
            {% else %}
            <input type="hidden" name="next" value="{% url 'show_all_profiles' %}">
            {% endif %}
        </form>
    </body>
</html>
