    Description: Shared HTML template for the mini_insta app that all 
    of the other templates extend. Includes the navigation header and stylesheet. 
-->
{% load static %}

<html>
    <head>
        <title>Mini Instagram</title>
        <!-- Linking the CSS stylesheet-->
        <link rel="stylesheet" href="{% static 'styles-blog.css' %}">
    </head>

    <body>
        <header>
            <h1>Mini Instagram</h1>
            <nav>
                <ul>
                    <li><a href="{% url 'show_all_profiles' %}">Show All</a></li>
                    <!-- only show the create post if a profile exists -->
                    {% if profile %} 
                    <li><a href="{% url 'create_post' pk=profile.pk %}">Create Post</a></li>
                    <li><a href="{% url 'show_feed' pk=profile.pk %}">Home</a></li>
                    <li><a href="{% url 'search' pk=profile.pk %}">Search</a></li>
                    <li><a href="{% url 'show_profile' pk=profile.pk %}">Profile</a></li>
                    {% endif %}
                </ul>
            </nav>
        </header>

        <!-- substitute in the specific content here -->
        {% block content %}
        {% endblock %}
    </body>

</html>
