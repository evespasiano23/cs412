    Description: Shared HTML template for the mini_insta app that all 
    of the other templates extend. Includes the navigation header and stylesheet. 
-->
{% load static %}

<html>
    <head>
        <title>Mini Instagram</title>
        <!-- Linking the CSS stylesheet-->
        <link rel="stylesheet" href="{% static 'styles-blog.css' %}">
    </head>

    <body>
        <header>
            <h1>Mini Instagram</h1>
        </header>

        <!-- substitute in the specific content here -->
        {% block content %}
        {% endblock %}

        <!-- bottom navigation bar -->
        {% if profile %}
        <nav style="position:fixed; bottom:0; width:100%; background:white; border-top:1px solid #ddd; display:flex; justify-content:space-around; padding:10px;">
            <a href="{% url 'show_feed' pk=profile.pk %}">🏀</a>
            <a href="{% url 'search' pk=profile.pk %}">🔍</a>
            <a href="{% url 'show_profile' pk=profile.pk %}">👤</a>
        </nav>
        {% endif %}
    </body>

</html>
