    File: show_all_profiles.html
    Author: Emily Vespasiano (evespa@bu.edu), 5/27/2026
    Description: Template to display all of the mini_insta profiles in a grid layout.
    Each individual profile card links to its own profile page.
-->
{% extends 'mini_insta/base.html' %}

{% block content %}
<h1>All Profiles (Knicks Edition)</h1>

<main class="grid-container">
    <!-- scriptlet code for a for loop. This loops over every insta profile and displays it as a card. -->
    {% for profile in profiles %}
    <article style="border-radius:12px; overflow:hidden; background:white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding:0;">
        <!-- clicking on the image links to that specific profile's information page -->
        <a href="{% url 'show_profile' profile.pk %}">
            <img src="{{profile.profile_image_url}}" alt="">
        </a>
        <!-- so that the display name and username appear below the image -->
        <div style="padding:16px;">
            <h2 style="margin:0 0 4px 0;">{{profile.display_name}}</h2>
            <p style="color:navy; margin:0 0 8px 0;">@{{profile.username}}</p>
        </div>
    </article>

    {% endfor %}
</main>
{% endblock %}
